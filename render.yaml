# =====================================================================
# CareerBridge — Render Blueprint (Infrastructure as Code)
#
# One-click deploy: Render Dashboard → New → Blueprint → connect this repo.
# Render reads this file and provisions all three resources with env vars,
# migrations, and health checks pre-wired.
#
# Resources:
#   1. careerbridge-db   — managed PostgreSQL 16
#   2. careerbridge-api  — Node backend web service (Express + Prisma)
#   3. careerbridge-web  — Vite static site (React frontend)
#
# After the blueprint is created you only need to:
#   - (optional) set GEMINI_API_KEY on careerbridge-api for real AI
#   - run the one-time seed from the careerbridge-api Shell (see DEPLOY_NOW.md)
#
# LIVE URLS (confirmed 2026-07-18 — Render suffixed the API service name):
#   backend  https://careerbridge-api-uig2.onrender.com
#   frontend https://careerbridge-web.onrender.com
# =====================================================================

databases:
  - name: careerbridge-db
    databaseName: careerbridge
    plan: free            # upgrade to "starter" for production durability
    postgresMajorVersion: "16"

services:
  # ---------------------------------------------------------------
  # Backend — Node web service
  # ---------------------------------------------------------------
  - type: web
    name: careerbridge-api
    runtime: node
    plan: free            # free tier sleeps after inactivity; upgrade for always-on
    rootDir: backend
    # `npm install` (not `npm ci`) so Render's npm reconciles the lock file —
    # the committed backend lock drifts from package.json across npm versions.
    buildCommand: npm install && npx prisma generate && npm run build
    # Migrations run at startup (free tier has no pre-deploy phase). At boot
    # DATABASE_URL is guaranteed present and the DB is up; `migrate deploy` is
    # idempotent, so this safely applies pending migrations on every deploy.
    startCommand: npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"        # Render's default web port; the app reads PORT
      - key: DATABASE_URL
        fromDatabase:
          name: careerbridge-db
          property: connectionString
      # JWT secrets: Render generates strong random values (>32 chars) — never
      # committed to the repo. Rotating them invalidates all existing sessions.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      # Frontend origin, used for CORS. Must match the static site URL exactly.
      - key: CORS_ORIGIN
        value: https://careerbridge-web.onrender.com
      # This API's own public origin, used to build absolute resume/share links.
      - key: APP_BASE_URL
        value: https://careerbridge-api-uig2.onrender.com
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-flash-latest
      - key: GEMINI_ENDPOINT
        value: auto
      # Real AI is optional: unset ⇒ every AI module runs in deterministic
      # "Estimated" mode and the app is fully usable. Set it in the dashboard
      # (sync:false keeps it out of the repo) to enable real Gemini.
      - key: GEMINI_API_KEY
        sync: false
      # Redis is optional — the backend falls back to an in-memory cache when
      # it can't connect, so no Redis instance is required for a first deploy.
      # To add one later, provision a Render Key Value store and set REDIS_URL.

  # ---------------------------------------------------------------
  # Frontend — Vite static site
  # ---------------------------------------------------------------
  - type: web
    name: careerbridge-web
    runtime: static
    rootDir: .
    # `npm install`, not `npm ci` — same lock-file-drift issue hit the backend
    # (Render's npm can resolve differently than the committed lock).
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    # SPA routing: every path falls back to index.html so client-side routes work.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Backend ORIGIN (no /api/v1 suffix — the app appends it). Also used for
      # the Socket.IO connection. Must match the backend service URL exactly.
      - key: VITE_API_URL
        value: https://careerbridge-api-uig2.onrender.com
