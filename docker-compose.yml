version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: careerbridge_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: careerbridge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: careerbridge_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careerbridge_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres_password@db:5432/careerbridge?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 5000
      NODE_ENV: production
      JWT_ACCESS_SECRET: default_secret_value
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: careerbridge_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
