name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # lets you build manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Your Railway backend — baked into the web build here.
      VITE_API_URL: https://honest-adaptation-production-ceb3.up.railway.app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build web assets
        run: npm run build

      - name: Verify backend URL is baked into the build
        # A build that ships without the real backend URL is worse than a failed
        # build: the app installs fine but every request dies with "Failed to
        # fetch", because the code falls back to http://localhost:5000 (the
        # phone itself). `.env.production` is gitignored, so on CI the URL comes
        # only from the VITE_API_URL env above — this step proves it actually
        # made it into the bundle before we waste time packaging an APK.
        run: |
          if grep -rq "honest-adaptation-production-ceb3" dist/assets/*.js; then
            echo "OK: backend URL is present in the built bundle."
          else
            echo "::error::VITE_API_URL was not baked into the build — the APK would fail every request with 'Failed to fetch'. Aborting."
            exit 1
          fi
          if grep -rq "localhost:5000" dist/assets/*.js; then
            echo "::error::The build still references localhost:5000 — a device cannot reach that. Aborting."
            exit 1
          fi

      - name: Sync Capacitor Android
        run: |
          if [ ! -d "android" ]; then npx cap add android; fi
          npx cap sync android

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug

      - name: Publish APK to a Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-build-${{ github.run_number }}
          name: CareerBridge APK build ${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
