name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # lets you build manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Your Railway backend — baked into the web build here.
      VITE_API_URL: https://honest-adaptation-production-ceb3.up.railway.app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android
        run: |
          if [ ! -d "android" ]; then npx cap add android; fi
          npx cap sync android

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug

      - name: Publish APK to a Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-build-${{ github.run_number }}
          name: CareerBridge APK build ${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
