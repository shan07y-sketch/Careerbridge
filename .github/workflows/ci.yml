name: CareerBridge CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          backend/package-lock.json

    - name: Install Frontend Dependencies
      run: npm ci

    - name: Compile Frontend Build Check
      run: npm run build

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm ci

    - name: Compile Backend Build Check
      run: |
        cd backend
        npx prisma generate
        npm run build
