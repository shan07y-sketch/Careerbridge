name: CareerBridge CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # A real Postgres instance so `prisma migrate deploy` (and any future
    # integration tests that hit a real database) can run in CI exactly as
    # they would in production, instead of only being exercised locally.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: careerbridge_ci
          POSTGRES_PASSWORD: careerbridge_ci_password
          POSTGRES_DB: careerbridge_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U careerbridge_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://careerbridge_ci:careerbridge_ci_password@localhost:5432/careerbridge_ci?schema=public
      NODE_ENV: test
      JWT_ACCESS_SECRET: ci_test_access_secret_not_used_outside_pipeline_runs
      JWT_REFRESH_SECRET: ci_test_refresh_secret_not_used_outside_pipeline_runs
      CORS_ORIGIN: http://localhost:5173
      REDIS_URL: redis://localhost:6379

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          backend/package-lock.json

    - name: Install Frontend Dependencies
      run: npm ci

    - name: Compile Frontend Build Check
      run: npm run build

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm ci

    - name: Apply Database Migrations
      run: |
        cd backend
        npx prisma generate
        npx prisma migrate deploy

    # This is the required check the Phase 0 audit flagged as missing: CI
    # previously only compiled the backend and never ran a single test, and
    # `npm test` would have failed outright (jest was referenced but never
    # installed). This step now actually fails the pipeline on a broken test.
    - name: Run Backend Test Suite
      run: |
        cd backend
        npm test

    - name: Compile Backend Build Check
      run: |
        cd backend
        npm run build
